<!-- web_admin/dashboard.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSort Admin - Hệ thống Quản trị</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .sidebar-active { background-color: #f1f5f9; color: #1e293b; border-left: 4px solid #16a34a; }
        @keyframes modal-in { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-modal { animation: modal-in 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 font-sans">
    <div id="auth-loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-slate-200 border-t-green-600 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-500 font-bold text-sm tracking-widest uppercase">Đang xác thực hệ thống...</p>
    </div>

    <div class="flex min-h-screen">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r border-slate-200 p-6 flex flex-col shadow-sm fixed h-full z-10">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="bg-green-600 p-2 rounded-lg text-white font-black italic">E</div>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">EcoSort AD</h1>
            </div>
            <nav class="flex-1 space-y-1">
                <button onclick="switchTab('submissions')" id="btn-submissions" class="w-full text-left px-4 py-3 rounded-xl text-slate-500 font-bold transition sidebar-active">Báo cáo rác</button>
                <button onclick="switchTab('users')" id="btn-users" class="w-full text-left px-4 py-3 rounded-xl text-slate-500 font-bold transition hover:bg-slate-50">Người dùng</button>
            </nav>
            <div class="mt-auto pt-6 border-t border-slate-100">
                <p id="admin-email" class="text-[10px] text-slate-400 font-bold mb-3 truncate uppercase"></p>
                <button onclick="handleLogout()" class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-xs hover:bg-red-50 hover:text-red-600 transition">Đăng xuất</button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 ml-64 p-10">
            <section id="tab-submissions" class="tab-content">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800">Duyệt rác</h2>
                        <p class="text-slate-400 text-sm font-medium">Quản lý các báo cáo từ AI & Người dùng</p>
                    </div>
                    <div class="flex gap-2">
                        <select id="filter-status" onchange="fetchSubmissions()" class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold text-slate-600 outline-none focus:ring-2 focus:ring-green-500">
                            <option value="pending_review">Chờ duyệt</option>
                            <option value="approved">Đã duyệt</option>
                            <option value="rejected">Đã từ chối</option>
                        </select>
                        <button onclick="fetchSubmissions()" class="bg-slate-800 text-white px-5 py-2 rounded-xl font-bold text-sm hover:bg-slate-900 transition">Làm mới</button>
                    </div>
                </div>

                <div id="loader-submissions" class="text-center py-20 hidden">
                    <div class="animate-spin inline-block w-8 h-8 border-4 border-slate-200 border-t-green-600 rounded-full mb-4"></div>
                    <p class="text-slate-400 font-bold">Đang lấy dữ liệu...</p>
                </div>
                <div id="grid-submissions" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
            </section>
        </main>
    </div>

    <!-- DETAIL MODAL -->
    <div id="detail-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-50 hidden flex">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-2xl shadow-2xl animate-modal overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-slate-800">Chi tiết báo cáo</h3>
                <button onclick="closeDetailModal()" class="text-slate-400 hover:text-red-500 bg-slate-100 hover:bg-red-50 p-2 rounded-xl transition">Đóng</button>
            </div>
            <div id="detail-content" class="space-y-6">
                <!-- Nội dung sẽ được nạp qua JS -->
            </div>
        </div>
    </div>

    <script type="module">
        import { db, handleLogout, checkAdminPermissions } from './js/auth.js';
        window.handleLogout = handleLogout;
        window.db = db;

        let allSubmissions = [];

        // AUTH & INIT
        (async function init() {
            try {
                const { data: { session } } = await db.auth.getSession();
                if (!session) return window.location.replace('index.html');

                const user = await checkAdminPermissions(session.user);
                document.getElementById('admin-email').innerText = user.email;
                document.getElementById('auth-loader').classList.add('hidden');
                fetchSubmissions();
            } catch (e) {
                alert('Phiên đăng nhập hết hạn hoặc lỗi: ' + e.message);
                window.location.replace('index.html');
            }
        })();

        // FETCH DATA
        window.fetchSubmissions = async () => {
            const grid = document.getElementById('grid-submissions');
            const loader = document.getElementById('loader-submissions');
            const status = document.getElementById('filter-status').value;

            loader.classList.remove('hidden');
            grid.innerHTML = '';

            try {
                const { data, error } = await db.from('waste_submissions')
                    .select('*')
                    .eq('status', status)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                loader.classList.add('hidden');
                allSubmissions = data || [];

                if (allSubmissions.length === 0) {
                    grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-300 font-bold">Không có báo cáo nào ở trạng thái ${status}</div>`;
                    return;
                }

                allSubmissions.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl transition-all duration-300';
                    card.innerHTML = `
                        <div class="h-44 bg-slate-50 relative group">
                            ${item.scan_image_path ? `<img src="${item.scan_image_path}" class="w-full h-full object-cover">` : '<div class="w-full h-full flex items-center justify-center text-slate-300 text-[10px] font-bold">NO IMAGE</div>'}
                        </div>
                        <div class="p-8">
                            <h3 class="font-black text-slate-800 text-lg truncate">${item.suggested_name_vi || 'Yêu cầu mới'}</h3>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1 mb-6 italic">${item.tflite_top_label || 'AI chưa phân loại'}</p>

                            <div class="flex gap-2">
                                <button onclick="showDetail('${item.id}')" class="flex-1 bg-slate-800 text-white py-3 rounded-2xl text-xs font-black hover:bg-slate-900 transition">CHI TIẾT</button>
                                ${status === 'pending_review' ? `
                                    <button onclick="updateStatus('${item.id}', 'rejected')" class="bg-red-50 text-red-500 px-4 rounded-2xl font-bold text-xs hover:bg-red-100 transition">HỦY</button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                loader.classList.add('hidden');
                grid.innerHTML = `<div class="col-span-full p-10 bg-red-50 text-red-500 rounded-3xl text-sm font-bold">Lỗi: ${e.message}</div>`;
            }
        };

        window.showDetail = (id) => {
            const item = allSubmissions.find(s => s.id === id);
            if (!item) return;

            const content = document.getElementById('detail-content');
            content.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-50 rounded-[2rem] overflow-hidden border border-slate-100">
                        ${item.scan_image_path ? `<img src="${item.scan_image_path}" class="w-full h-full object-contain">` : '<p class="p-20 text-center text-slate-300 font-bold">KHÔNG CÓ ẢNH</p>'}
                    </div>
                    <div class="space-y-4">
                        <div class="bg-slate-50 p-6 rounded-3xl">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tên đề xuất</span>
                            <p class="text-xl font-black text-slate-800">${item.suggested_name_vi || 'N/A'}</p>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-3xl">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nhãn AI (TFLite)</span>
                            <p class="font-bold text-slate-800">${item.tflite_top_label || 'N/A'} (${(item.tflite_confidence * 100).toFixed(1)}%)</p>
                        </div>
                         <div class="bg-slate-50 p-6 rounded-3xl">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Trạng thái</span>
                            <p class="font-bold text-green-600 uppercase">${item.status}</p>
                        </div>
                    </div>
                </div>
                <div class="bg-slate-50 p-6 rounded-3xl">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Phân tích Gemini</span>
                    <p class="text-slate-600 text-sm mt-2 leading-relaxed">${item.gemini_payload?.result_text || 'Chưa có phân tích'}</p>
                </div>
                <div class="bg-slate-50 p-6 rounded-3xl">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Kiến thức bổ sung (Fun Fact)</span>
                    <p class="text-slate-600 text-sm mt-2">${item.suggested_fun_fact || 'N/A'}</p>
                </div>
                ${item.status === 'pending_review' ? `
                    <div class="pt-6 border-t border-slate-100 flex gap-4">
                        <button onclick="approveWithData('${item.id}')" class="flex-[2] bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-green-100 hover:bg-green-700 transition">DUYỆT VÀO HỆ THỐNG</button>
                        <button onclick="updateStatus('${item.id}', 'rejected')" class="flex-1 bg-red-50 text-red-500 py-4 rounded-2xl font-bold hover:bg-red-100 transition">TỪ CHỐI</button>
                    </div>
                ` : ''}
            `;

            document.getElementById('detail-modal').classList.remove('hidden');
            document.getElementById('detail-modal').classList.add('flex');
        };

        window.closeDetailModal = () => {
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('detail-modal').classList.remove('flex');
        };

        window.approveWithData = async (id) => {
             const item = allSubmissions.find(s => s.id === id);
             const slug = 'item-' + id.slice(0, 8);

             if (!confirm('Bạn muốn duyệt vật phẩm này vào từ điển hệ thống?')) return;

             try {
                const { error } = await db.rpc('admin_approve_waste_submission', {
                    p_submission_id: id,
                    p_slug: slug
                });
                if (error) throw error;
                alert('Đã duyệt thành công!');
                closeDetailModal();
                fetchSubmissions();
             } catch (e) {
                 alert('Lỗi: ' + e.message);
             }
        };

        window.updateStatus = async (id, newStatus) => {
            const { error } = await db.from('waste_submissions').update({ status: newStatus }).eq('id', id);
            if (error) alert(error.message); else {
                closeDetailModal();
                fetchSubmissions();
            }
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('sidebar-active', 'hover:bg-slate-50'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('sidebar-active');
            if (tab === 'submissions') fetchSubmissions();
        };
    </script>
</body>
</html>
